<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CS · неон & стекло</title>
  <!-- Подключаем раздельные файлы -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 6 основных блоков -->
  <section class="block block-1">
    <div class="glass-card">
      <h1>⚡ CS: НЕОН</h1>
      <p>Тактика. Огонь. Стекло.</p>
      <div class="neon-line"></div>
    </div>
  </section>

  <section class="block block-2">
    <div class="glass-card">
      <h2>🔫 ОРУЖИЕ</h2>
      <ul class="weapon-list">
        <li><span>AK-47</span> <span class="stat">✦ 32/90</span></li>
        <li><span>AWP</span> <span class="stat">✦ 10/30</span></li>
        <li><span>M4A1-S</span> <span class="stat">✦ 25/75</span></li>
        <li><span>Deagle</span> <span class="stat">✦ 7/35</span></li>
      </ul>
    </div>
  </section>

  <section class="block block-3">
    <div class="glass-card">
      <h2>🧊 КОМАНДЫ</h2>
      <div class="team-grid">
        <div class="team">CT ⚔️</div>
        <div class="team">T 💣</div>
      </div>
      <p class="small">баланс сил</p>
    </div>
  </section>

  <section class="block block-4">
    <div class="glass-card">
      <h2>🗺️ КАРТЫ</h2>
      <div class="map-list">
        <span>Dust2</span>
        <span>Mirage</span>
        <span>Inferno</span>
        <span>Nuke</span>
      </div>
    </div>
  </section>

  <section class="block block-5">
    <div class="glass-card">
      <h2>📊 СТАТИСТИКА</h2>
      <div class="stats">
        <div><span>Винрейт</span> <span class="value">68%</span></div>
        <div><span>Хедшоты</span> <span class="value">42%</span></div>
        <div><span>MVP</span> <span class="value">17</span></div>
      </div>
    </div>
  </section>

  <section class="block block-6">
    <div class="glass-card">
      <h2>🎯 ГОТОВ К БОЮ</h2>
      <button id="neonBtn" class="neon-btn">⚡ ЗАПУСТИТЬ РАУНД</button>
      <p id="statusMessage" class="status-msg">нажми, чтобы активировать</p>
    </div>
  </section>

  <!-- Подключаем JS -->
  <script src="script.js"></script>
</body>
</html>
